<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ឡូតូស្ដង់ដារឥតខ្ចោះ (ដេក ៥ ឈរ ៥)</title>
    <style>
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .caller-box { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #displayNum { font-size: 60px; font-weight: bold; color: #feca57; line-height: 1; }
        
        /* តារាងឡូតូ */
        .lotto-card { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            border: 2px solid #333; 
            margin: 20px auto;
            background: #fff;
        }
        .cell { 
            aspect-ratio: 1/1; border: 1px solid #ccc; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
        .cell.empty { background: #eeeeee; }
        .cell.marked { background: #27ae60 !important; color: white; border-radius: 50%; transform: scale(0.8); }

        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; transition: 0.3s; }
        .btn-draw { background: #eb2f06; color: white; width: 100%; font-size: 20px; }
        .btn-draw:hover { background: #b92605; }
        .btn-new { background: #3498db; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="caller-box">
        <h2 style="margin:0;">មេហៅលេខ</h2>
        <span id="displayNum">--</span>
        <button class="btn-draw" onclick="draw()">ចាប់លេខ</button>
    </div>

    <h3>សន្លឹក ៩x៩ (Strict ៥ លេខគ្រប់ជួរដេក និងជួរឈរ)</h3>
    <div id="cardGrid" class="lotto-card"></div>
    <button class="btn-new" onclick="createCard()">ប្តូរសន្លឹកបៀថ្មី</button>
</div>

<script>
    let pool = [];
    function init() {
        pool = Array.from({length: 90}, (_, i) => i + 1);
        createCard();
    }

    function draw() {
        if (pool.length === 0) return alert("អស់លេខហើយ!");
        let idx = Math.floor(Math.random() * pool.length);
        document.getElementById('displayNum').innerText = pool.splice(idx, 1)[0];
    }

    function createCard() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        
        let matrix = Array.from({length: 9}, () => Array(9).fill(null));
        let colCounts = Array(9).fill(0);
        let rowCounts = Array(9).fill(0);

        // ១. កំណត់ខ្ទង់លេខតាមជួរឈរ (១-៩, ១០-១៩... ៨០-៩០)
        const colRanges = [
            [1, 9], [10, 19], [20, 29], [30, 39], [40, 49], 
            [50, 59], [60, 69], [70, 79], [80, 90]
        ];

        // ២. Recursive Logic៖ ព្យាយាមបំពេញលេខម្តងមួយជួរដេក
        function solve(rowIdx) {
            if (rowIdx === 9) return true; // បញ្ចប់ដោយជោគជ័យ

            // រកជួរឈរដែលមិនទាន់គ្រប់ ៥
            let possibleCols = [];
            for (let c = 0; c < 9; c++) if (colCounts[c] < 5) possibleCols.push(c);
            
            if (possibleCols.length < 5) return false; // បរាជ័យ កូដនឹងត្រឡប់ក្រោយ (Backtrack)

            // Shuffle ជួរឈរដែលជាទៅរួច ដើម្បីឱ្យសន្លឹកបៀប្រែប្រួលរហូត
            possibleCols.sort(() => Math.random() - 0.5);

            // សាកល្បងជ្រើសរើស ៥ ជួរឈរដើម្បីបំពេញ
            function fillRow(cols) {
                if (cols.length < 5) return false;
                
                let selected = cols.slice(0, 5);
                
                selected.forEach(c => {
                    let range = colRanges[c];
                    let num;
                    let isDuplicate;
                    do {
                        num = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
                        isDuplicate = false;
                        for(let i=0; i<rowIdx; i++) if(matrix[i][c] === num) isDuplicate = true;
                    } while (isDuplicate);
                    
                    matrix[rowIdx][c] = num;
                    colCounts[c]++;
                });

                if (solve(rowIdx + 1)) return true; // បន្តទៅជួរដេកបន្ទាប់

                // ប្រសិនបើជួរបន្ទាប់បរាជ័យ ត្រូវលុបលេខចេញវិញ (Backtrack)
                selected.forEach(c => {
                    matrix[rowIdx][c] = null;
                    colCounts[c]--;
                });
                return false;
            }
            
            // ព្យាយាមចែកចាយ ៥ ជួរឈរតាមលំនាំផ្សេងៗគ្នា
            for (let i = 0; i < possibleCols.length - 4; i++) {
                if (fillRow(possibleCols.slice(i, i + 5))) return true;
            }
            
            return false;
        }

        solve(0); // ចាប់ផ្តើមបំពេញពីជួរដេកទី ១

        // ៣. បង្ហាញក្នុង HTML
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell' + (matrix[r][c] === null ? ' empty' : '');
                cell.innerText = matrix[r][c] || '';
                if (matrix[r][c]) {
                    cell.onclick = function() { this.classList.toggle('marked'); };
                }
                grid.appendChild(cell);
            }
        }
    }

    init();
</script>

</body>
</html>
